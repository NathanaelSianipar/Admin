<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Tentang Kami</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <img th:src="@{/images/logo.png}">

        <h2>Komplid Academy</h2>

    </div>

    <ul>
        <li><a href="/">Dashboard</a></li>
        <li><a href="/tentang" class="active">Tentang Kami</a></li>
        <li><a href="/lulusan">Lulusan</a></li>
        <li><a href="/program">Program</a></li>
        <li><a href="/galeri">Galeri</a></li>
        <li><a href="/kontak">Kontak</a></li>
    </ul>

</div>

<div class="main">

    <div class="table-container">

        <div class="table-header">

            <h2>Data Tentang Kami</h2>

            <a href="/tentang/create" class="btn">
                + Tambah Data
            </a>

        </div>

        <table class="table">

            <thead>

            <tr>
                <th>No</th>
                <th>Gambar</th>
                <th>Judul</th>
                <th>Deskripsi</th>
                <th>Aksi</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="t, stat : ${tentangList}">

                <td th:text="${stat.count}"></td>

                <td>
                    <img th:src="@{'/images/' + ${t.gambar}}"
                         class="foto">
                </td>

                <td th:text="${t.judul}"></td>

                <td th:text="${t.deskripsi}"></td>

                <td>

                    <div class="action">

                        <a th:href="@{/tentang/edit/{id}(id=${t.id})}">
                            <button class="btn edit">
                                Edit
                            </button>
                        </a>

                        <a th:href="@{/tentang/delete/{id}(id=${t.id})}">
                            <button class="btn delete">
                                Delete
                            </button>
                        </a>

                    </div>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
