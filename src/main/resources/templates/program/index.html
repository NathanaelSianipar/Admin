<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Program</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div class="sidebar">
        <div class="logo">
            <img th:src="@{/images/logo.png}">
            <h2>Komplid Academy</h2>
        </div>

        <ul>
            <li><a href="/admin">Dashboard</a></li>
            <li><a href="/tentang">Tentang Kami</a></li>
            <li><a href="/lulusan">Lulusan</a></li>
            <li><a href="/program" class="active">Program</a></li>
            <li><a href="/galeri">Galeri</a></li>
            <li><a href="/kontak">Kontak</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </div>

    <div class="main">
        <div class="table-container">
            
            <div class="table-header">
                <h2>Data Program Kerja</h2>
                <a href="/program/create" class="btn">
                    + Tambah Program
                </a>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama Program</th>
                        <th>Deskripsi</th>
                        <th>Durasi</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="program, stat : ${listProgram}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${program.namaProgram}"></td>
                        <td th:text="${program.deskripsi}"></td>
                        <td th:text="${program.durasi}"></td>
                        <td>
                            <div class="action">
                                <a th:href="@{/program/edit/{id}(id=${program.id})}">
                                    <button class="btn edit">Edit</button>
                                </a>
                                <a th:href="@{/program/delete/{id}(id=${program.id})}" 
                                   onclick="return confirm('Yakin ingin menghapus program ini?')">
                                    <button class="btn delete">Delete</button>
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

</body>
</html>
