<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kelola Program - Komplid Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Daftar Program Kerja</h4>
                <a th:href="@{/program/add}" class="btn btn-light btn-sm fw-bold">+ Tambah Program</a>
            </div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>No</th>
                            <th>Nama Program</th>
                            <th>Deskripsi</th>
                            <th>Durasi</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="prog, iterStat : ${listProgram}">
                            <td th:text="${iterStat.count}">1</td>
                            <td th:text="${prog.namaProgram}">Nama Program</td>
                            <td th:text="${prog.deskripsi}">Deskripsi Program</td>
                            <td th:text="${prog.durasi}">3 Bulan</td>
                            <td>
                                <a th:href="@{/program/edit/{id}(id=${prog.id})}" class="btn btn-warning btn-sm">Edit</a>
                                <a th:href="@{/program/delete/{id}(id=${prog.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Yakin ingin menghapus program ini?')">Hapus</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listProgram)}">
                            <td colspan="5" class="text-center text-muted">Belum ada data program.</td>
                        </tr>
                    </tbody>
                </table>
                <div class="mt-3">
                    <a href="/admin" class="btn btn-secondary btn-sm">Kembali ke Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
