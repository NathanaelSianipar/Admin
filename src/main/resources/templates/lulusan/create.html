<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Tambah Lulusan</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>

<div class="sidebar">

    <div class="logo">

        <img th:src="@{/images/logo.png}">

        <h2>Komplid Academy</h2>

    </div>

</div>

<div class="main">

    <div class="form-container">

        <h2>Tambah Data Lulusan</h2>

        <br>

        <form action="/lulusan/save" method="post">

            <div class="form-group">

                <label>Nama</label>

                <input type="text"
                       name="nama"
                       class="form-control">

            </div>

            <div class="form-group">

                <label>Pekerjaan</label>

                <input type="text"
                       name="pekerjaan"
                       class="form-control">

            </div>

            <div class="form-group">

                <label>Link Foto</label>

                <input type="text"
                       name="foto"
                       class="form-control">

            </div>

            <div class="form-group">

                <label>Tahun Lulus</label>

                <input type="number"
                       name="tahunLulus"
                       class="form-control">

            </div>

            <button class="btn">
                Simpan
            </button>

        </form>

    </div>

</div>

</body>
</html>
