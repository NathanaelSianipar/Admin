# Port aplikasi (default Spring Boot adalah 8080)
server.port=8080

# Konfigurasi Koneksi Database MySQL (Sudah disesuaikan dengan database kelompok & port laptopmu)
spring.datasource.url=jdbc:mysql://localhost:3306/db_komplidacademy?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Pengaturan Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect